<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Check-in confirmado</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
text-align:center;
}

.container{
background:#1e293b;
padding:50px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
max-width:500px;
width:90%;
}

.check{
font-size:90px;
color:#22c55e;
animation:pop 0.6s ease;
}

h1{
margin-top:10px;
font-size:32px;
}

.nombre{
font-size:44px;
font-weight:bold;
margin-top:15px;
color:#38bdf8;
}

.boton{
margin-top:35px;
font-size:22px;
padding:15px 30px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

.boton:hover{
background:#16a34a;
}

@keyframes pop{
0%{transform:scale(0)}
70%{transform:scale(1.3)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<div class="check">✔</div>

<h1>Check-in confirmado</h1>

<div class="nombre" id="nombre">Bienvenido</div>

<button class="boton" onclick="confirmar()">🔊 Confirmar check-in</button>

</div>

<audio id="scanner">
<source src="https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3" type="audio/mpeg">
</audio>

<script>

const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
document.getElementById("nombre").textContent = nombre;
}

function confirmar(){

const audio = document.getElementById("scanner");
audio.play();

const texto = nombre
? "Check in confirmado. Bienvenido " + nombre
: "Check in confirmado";

const voz = new SpeechSynthesisUtterance(texto);

voz.lang = "es-ES";
voz.rate = 1.2;
voz.pitch = 1;

speechSynthesis.speak(voz);

}

</script>

</body>
</html>
