<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Check-in completado</title>

<style>

body{
font-family: Arial, sans-serif;
background:#22c55e;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
text-align:center;
}

.container{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

.check{
font-size:80px;
margin-bottom:20px;
animation:pop 0.6s ease;
}

h1{
font-size:36px;
margin:10px 0;
}

.nombre{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

.boton{
margin-top:30px;
font-size:22px;
padding:15px 30px;
border:none;
border-radius:12px;
background:white;
color:#16a34a;
cursor:pointer;
}

@keyframes pop{
0%{transform:scale(0)}
70%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<div class="check">✅</div>

<h1>Check-in realizado</h1>

<div class="nombre" id="nombre">Bienvenido</div>

<button class="boton" onclick="playSound()">🔊 Confirmar</button>

</div>

<audio id="sound">
<source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
</audio>

<script>

const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
document.getElementById("nombre").textContent = nombre;
}

function playSound(){
const audio = document.getElementById("sound");
audio.play();
}

</script>

</body>
</html>
